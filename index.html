<!DOCTYPE html>
<html>
<head>
  <title>CDFS Dashboard</title>

  <!-- 🔥 Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- 🔥 Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>CDFS</h2>

    <button onclick="uploadFile()">Upload</button>
    <button onclick="downloadFile()">Download</button>
    <button onclick="showNodes()">Nodes</button>
    <button onclick="showStorage()">Storage</button>

    <!-- 🔐 Google Login -->
    <button onclick="googleLogin()" class="googleBtn">
      Sign in with Google 🔐
    </button>

    <p id="userInfo"></p>
  </div>

  <!-- Main -->
  <div class="main">
    <h1>Custom Distributed File System</h1>

    <!-- Upload -->
    <input type="file" id="fileInput">
    <button class="uploadBtn" onclick="uploadFile()">Upload File</button>

    <!-- Wallpaper -->
    <br><br>
    <input type="file" id="bgInput">
    <button onclick="setWallpaper()">Set Wallpaper 🎨</button>

    <!-- Canvas -->
    <canvas id="net"></canvas>
  </div>

  <!-- Files -->
  <div class="files">
    <h2>Files</h2>
    <ul id="fileList"></ul>
  </div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
